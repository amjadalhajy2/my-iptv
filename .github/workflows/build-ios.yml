name: Build Unsigned iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # الأداة الرسمية من آبل لتفعيل الإصدار الحديث من Xcode
      - name: Set up Xcode 16.4
        uses: apple/actions/setup-xcode@v3
        with:
          xcode-version: '16.4'

      - name: Install Dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build Xcode Project (Unsigned for Device)
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" -json | tr -d '\n[:space:]' | sed -E 's/.*"schemes":\["([^"]+)".*/\1/')
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -R ios/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Unsigned-App
          path: app.ipa