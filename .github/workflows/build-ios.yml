name: Build Unsigned iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3.0'

      - name: Install Dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build Xcode Project (Unsigned for Device)
        run: |
          cd ios
          # استخراج اسم التطبيق الصحيح مباشرة من اسم مساحة العمل
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          echo "جاري بناء التطبيق الرئيسي: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build

      - name: Package into IPA
        run: |
          # البحث الشامل
          APP_PATH=$(find . -type d -name "*.app" -not -path "*/node_modules/*" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "لم يتم العثور على ملف التطبيق، جاري طباعة محتويات مجلد المنتجات:"
            find . -name "Release-iphoneos" -exec ls -la {} \;
            exit 1
          fi
          
          echo "تم العثور على التطبيق في المسار: $APP_PATH"
          
          # تجهيز المجلد وتغليف التطبيق
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Unsigned-App
          path: app.ipa